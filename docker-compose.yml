version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dukaan-postgres
    environment:
      POSTGRES_DB: dukaan
      POSTGRES_USER: dukaan
      POSTGRES_PASSWORD: dukaan123
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dukaan"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - dukaan-network

volumes:
  postgres_data:
    driver: local

networks:
  dukaan-network:
    driver: bridge
