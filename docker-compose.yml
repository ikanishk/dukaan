services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dukaan-backend
    environment:
      SPRING_PROFILES_ACTIVE: h2
    ports:
      - "8080:8080"
    networks:
      - dukaan-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dukaan-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
      NEXT_PUBLIC_APP_NAME: Dukaan
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - dukaan-network
    restart: unless-stopped

networks:
  dukaan-network:
    driver: bridge
